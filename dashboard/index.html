<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hound — real-time emergency response console: live location and audio from triggered devices." />
  <title>Hound · Emergency Response</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23ff3b4e' d='M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Login overlay -->
  <div id="login" class="login-overlay">
    <form id="login-form" class="login-card">
      <div class="brand"><span class="dot"></span> HOUND</div>
      <p class="subtitle">Emergency Response Console</p>
      <input id="email" type="email" placeholder="Email" autocomplete="username" required />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" required />
      <button type="submit">Sign in</button>
      <div id="login-error" class="error"></div>
    </form>
  </div>

  <!-- App -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="brand"><span class="dot"></span> HOUND</div>
      <div class="status">
        <span id="ws-status" class="ws-dot offline" title="realtime status"></span>
        <span id="ws-label">connecting…</span>
      </div>
      <nav class="nav">
        <button id="nav-alerts" class="nav-btn active">Alerts</button>
        <button id="nav-people" class="nav-btn">People</button>
      </nav>
      <div class="spacer"></div>
      <span id="who" class="who"></span>
      <button id="logout" class="ghost">Sign out</button>
    </header>

    <main class="layout" id="alerts-view">
      <aside class="sidebar">
        <div class="filter-row">
          <button class="filter active" data-filter="active">Active</button>
          <button class="filter" data-filter="all">All</button>
        </div>
        <div id="alert-list" class="alert-list"></div>
      </aside>

      <section class="map-wrap">
        <div id="map"></div>
        <div id="detail" class="detail hidden"></div>
      </section>
    </main>

    <section id="people-view" class="people-view hidden">
      <div class="people-head">
        <h2>Protected people</h2>
        <p>Everyone registered, with the emergency contacts they signed up with.</p>
      </div>
      <div id="people-list" class="people-list"></div>
    </section>
  </div>

  <audio id="siren" preload="auto"></audio>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
